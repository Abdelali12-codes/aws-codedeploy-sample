# appspec.yml — Demonstrating file_exists_behavior: OVERWRITE / RETAIN / DISALLOW
#
# USE CASE: Hotfix files go missing after failed deployment + auto-rollback
#
# WHAT HAPPENED (the bug):
#   Revision 1 deployed → app running fine
#   Developer manually uploads hotfix/ files directly to instances (not in revision)
#   Revision 2 is released (includes hotfix/ files) → deployment FAILS
#   CodeDeploy auto-rolls back to Revision 1
#   Revision 1 appspec has no hotfix/ entry → CodeDeploy removes hotfix/ files
#   App breaks because hotfix files are gone
#
# WHY IT HAPPENED:
#   Default file_exists_behavior is OVERWRITE.
#   On rollback, CodeDeploy re-deploys Revision 1 which has no hotfix/ entry.
#   Files not in the revision are REMOVED from the instance during rollback.
#   The manually uploaded files had no protection — they were never part of
#   any revision, so rollback had no way to preserve them.
#
# LAYER 1 FIX — Immediate (partial protection, forward deploy only):
#   Add file_exists_behavior: RETAIN on the hotfix/ entry in the NEW revision.
#   This prevents OVERWRITE during a forward deploy if files already exist.
#   BUT: if rollback happens, the OLD appspec (Revision 1) runs — it has no
#   RETAIN rule for hotfix/ → files are still removed on rollback.
#
# LAYER 2 FIX — Permanent (the real fix):
#   ALWAYS include hotfix files in the revision from the start.
#   Never manually upload files to instances as a deployment strategy.
#   The revision is the single source of truth for all instance files.
#   For urgent hotfixes: create a new revision that includes the fix and
#   deploy it through the pipeline — do not bypass CodeDeploy.

version: 0.0
os: linux

files:
  # ── OVERWRITE (default) ───────────────────────────────────────────────────
  # App code — always replace with the latest revision.
  - source: /app
    destination: /var/www/my-app
    file_exists_behavior: OVERWRITE

  # ── RETAIN ────────────────────────────────────────────────────────────────
  # hotfix_patch.py lives inside app/ and is deployed with OVERWRITE above.
  # To demonstrate RETAIN: we add a second entry specifically for this file
  # so CodeDeploy keeps any instance-level edits to it across deployments.
  # NOTE: when two entries target the same file, the LAST matching entry wins.
  - source: /app/hotfix_patch.py
    destination: /var/www/my-app
    file_exists_behavior: RETAIN

  # ── DISALLOW ──────────────────────────────────────────────────────────────
  # Sentinel lock file written by stop_app.sh.
  # Fails deployment immediately if the app was not stopped cleanly.
  - source: /config/deploy.lock
    destination: /var/run/my-app
    file_exists_behavior: DISALLOW

permissions:
  - object: /var/www/my-app
    owner: ubuntu
    group: ubuntu
    mode: "755"
    type:
      - directory
      - file

hooks:
  ApplicationStop:
    - location: scripts/stop_app.sh
      timeout: 30
      runas: root

  BeforeInstall:
    - location: scripts/before_install.sh
      timeout: 60
      runas: root

  AfterInstall:
    - location: scripts/after_install.sh
      timeout: 60
      runas: root

  ApplicationStart:
    - location: scripts/start_app.sh
      timeout: 30
      runas: root

  ValidateService:
    - location: scripts/validate.sh
      timeout: 60
      runas: root
